[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # Set VITE_API_URL in Netlify dashboard to your Render backend URL, e.g.:
  # VITE_API_URL = "https://intentspace-api.onrender.com/api"
